name: semantic-action-e2e-benchmark

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

jobs:
  sem401-semantic-action-e2e-benchmark:
    runs-on: macos-14
    timeout-minutes: 30
    env:
      BENCHMARK_ROOT: ${{ runner.temp }}/semantic-action-e2e-benchmark
      SEMANTIC_E2E_REPEAT_COUNT: "3"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run SEM-401 semantic action end-to-end benchmark
        run: |
          python3 scripts/benchmarks/run_semantic_action_e2e_benchmark.py \
            --benchmark-root "$BENCHMARK_ROOT" \
            --report "$BENCHMARK_ROOT/manifest.json" \
            --repeat-count "$SEMANTIC_E2E_REPEAT_COUNT"

      - name: Run SEM-402 semantic action metric gates
        run: |
          python3 scripts/benchmarks/aggregate_semantic_action_e2e_metrics.py \
            --benchmark-root "$BENCHMARK_ROOT" \
            --manifest "$BENCHMARK_ROOT/manifest.json" \
            --config data/benchmarks/semantic-action-e2e/metrics-v0.json \
            --output "$BENCHMARK_ROOT/metrics-summary.json" \
            --check-gates

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semantic-action-e2e-benchmark-${{ github.run_id }}
          path: ${{ env.BENCHMARK_ROOT }}
          if-no-files-found: error
