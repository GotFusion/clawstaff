<svg width="1600" height="980" viewBox="0 0 1600 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="120" y1="40" x2="1460" y2="920" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F1F7FF"/>
      <stop offset="0.45" stop-color="#EBF7F3"/>
      <stop offset="1" stop-color="#FFF4E7"/>
    </linearGradient>
    <linearGradient id="orb" x1="250" y1="380" x2="520" y2="610" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0EA5E9"/>
      <stop offset="1" stop-color="#0F766E"/>
    </linearGradient>
    <linearGradient id="panel" x1="180" y1="330" x2="1140" y2="790" gradientUnits="userSpaceOnUse">
      <stop stop-color="#EAF4FF"/>
      <stop offset="1" stop-color="#E7F8F1"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="1900" height="1200" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="22" flood-color="#0F172A" flood-opacity="0.2"/>
    </filter>
    <style>
      .title { font: 700 34px "Avenir Next", "PingFang SC", sans-serif; fill: #0B2748; }
      .sub { font: 500 16px "Avenir Next", "PingFang SC", sans-serif; fill: #5E748C; }
      .label { font: 600 13px "Avenir Next", "PingFang SC", sans-serif; fill: #1E3A5A; }
      .text { font: 500 16px "Avenir Next", "PingFang SC", sans-serif; fill: #1F3552; }
      .hint { font: 500 12px "Avenir Next", "PingFang SC", sans-serif; fill: #6B7F95; }
      .mini { font: 600 12px "Avenir Next", "PingFang SC", sans-serif; }
    </style>
  </defs>

  <rect width="1600" height="980" fill="url(#bg)"/>

  <text x="92" y="128" class="title">前台部件 · 精简模式（球/椭圆）</text>
  <text x="92" y="162" class="sub">显示当前任务 + 下一步任务（缩略），点击即可展开详细时间轴。</text>

  <rect x="92" y="206" width="1416" height="700" rx="30" fill="#FFFFFF" filter="url(#shadow)"/>

  <rect x="142" y="264" width="1000" height="544" rx="74" fill="url(#panel)"/>

  <ellipse cx="252" cy="536" rx="118" ry="118" fill="url(#orb)"/>
  <ellipse cx="252" cy="536" rx="111" ry="111" stroke="#CFFAFE" stroke-width="2"/>
  <circle cx="252" cy="536" r="74" fill="#0C4A6E" fill-opacity="0.22"/>
  <text x="225" y="542" fill="#E0F2FE" font-family="Avenir Next, PingFang SC, sans-serif" font-size="24" font-weight="700">OS</text>
  <text x="190" y="582" fill="#BAE6FD" font-family="Avenir Next, PingFang SC, sans-serif" font-size="13" font-weight="600">精简模式</text>

  <rect x="382" y="420" width="706" height="232" rx="36" fill="#FFFFFF" fill-opacity="0.82"/>
  <rect x="408" y="448" width="142" height="28" rx="14" fill="#DBEAFE"/>
  <text x="446" y="467" fill="#1D4ED8" class="mini">当前任务</text>

  <text x="408" y="516" class="text">辅助 · task-session-20260309-a1-024</text>
  <text x="408" y="548" class="hint">11:24:36 · 预测下一步并等待老师确认</text>

  <rect x="408" y="576" width="648" height="52" rx="16" fill="#EFF6FF"/>
  <text x="430" y="608" class="text">下一步：学生 · task-session-20260309-a1-025（缩略）</text>

  <circle cx="1036" cy="462" r="20" fill="#BFDBFE"/>
  <path d="M1028 462h16M1036 454v16" stroke="#1D4ED8" stroke-width="2.4" stroke-linecap="round"/>

  <text x="382" y="692" class="hint">点击球体/椭圆区域：切换到详细模式（展开时间轴）</text>

  <rect x="1178" y="312" width="284" height="496" rx="22" fill="#F8FAFC"/>
  <text x="1204" y="348" class="label">右侧状态卡</text>

  <rect x="1204" y="370" width="232" height="76" rx="12" fill="#EEF2FF"/>
  <text x="1222" y="402" class="text">模式：精简</text>
  <text x="1222" y="426" class="hint">来源：菜单栏切换</text>

  <rect x="1204" y="458" width="232" height="76" rx="12" fill="#ECFEFF"/>
  <text x="1222" y="490" class="text">更新时间</text>
  <text x="1222" y="514" class="hint">2026-03-09 11:26:04</text>

  <rect x="1204" y="546" width="232" height="76" rx="12" fill="#F0FDF4"/>
  <text x="1222" y="578" class="text">自动刷新</text>
  <text x="1222" y="602" class="hint">每 2 秒同步任务流</text>

  <rect x="1204" y="634" width="232" height="76" rx="12" fill="#FEF2F2"/>
  <text x="1222" y="666" fill="#B91C1C" font-family="Avenir Next, PingFang SC, sans-serif" font-size="16" font-weight="600">紧急停止可用</text>
  <text x="1222" y="690" class="hint">Cmd + Shift + .</text>

  <rect x="1204" y="722" width="232" height="56" rx="12" fill="#FFF7ED"/>
  <text x="1222" y="756" class="hint">菜单栏可直接切到详细模式</text>

  <path d="M566 268 C 646 248, 732 248, 810 268" stroke="#93C5FD" stroke-width="2" stroke-dasharray="6 6"/>
  <text x="618" y="246" class="hint">显示任务缩略信息</text>
</svg>
