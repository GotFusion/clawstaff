<svg width="1600" height="1100" viewBox="0 0 1600 1100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="120" y1="40" x2="1460" y2="1040" gradientUnits="userSpaceOnUse">
      <stop stop-color="#EEF5FF"/>
      <stop offset="0.5" stop-color="#EAF8F2"/>
      <stop offset="1" stop-color="#FFF3E6"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="1900" height="1400" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="22" flood-color="#0F172A" flood-opacity="0.2"/>
    </filter>
    <style>
      .title { font: 700 34px "Avenir Next", "PingFang SC", sans-serif; fill: #0B2748; }
      .sub { font: 500 16px "Avenir Next", "PingFang SC", sans-serif; fill: #5E748C; }
      .panelTitle { font: 700 20px "Avenir Next", "PingFang SC", sans-serif; fill: #103050; }
      .task { font: 600 16px "Avenir Next", "PingFang SC", sans-serif; fill: #1E3A5A; }
      .detail { font: 500 13px "Avenir Next", "PingFang SC", sans-serif; fill: #667A90; }
      .mono { font: 500 12px "Menlo", "SFMono-Regular", monospace; fill: #4A6178; }
    </style>
  </defs>

  <rect width="1600" height="1100" fill="url(#bg)"/>

  <text x="92" y="128" class="title">前台部件 · 详细模式（时间轴）</text>
  <text x="92" y="162" class="sub">显示任务顺序、时间、一级任务、二级任务。由点击球体或菜单栏切换进入。</text>

  <rect x="92" y="206" width="1416" height="850" rx="30" fill="#FFFFFF" filter="url(#shadow)"/>

