<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="desk" x1="80" y1="20" x2="1520" y2="860" gradientUnits="userSpaceOnUse">
      <stop stop-color="#95B0D4"/>
      <stop offset="0.52" stop-color="#7CA59E"/>
      <stop offset="1" stop-color="#B3957E"/>
    </linearGradient>
    <filter id="menuShadow" x="0" y="0" width="1900" height="1200" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0F172A" flood-opacity="0.24"/>
    </filter>
    <style>
      .title { font: 700 30px "SF Pro Display", "PingFang SC", sans-serif; fill: #F8FAFC; }
      .hint { font: 500 14px "SF Pro Display", "PingFang SC", sans-serif; fill: #E2E8F0; }
      .menuHeader { font: 500 13px "SF Pro Display", "PingFang SC", sans-serif; fill: #334155; }
      .menuItem { font: 500 16px "SF Pro Display", "PingFang SC", sans-serif; fill: #0F172A; }
      .menuDanger { font: 600 16px "SF Pro Display", "PingFang SC", sans-serif; fill: #B91C1C; }
      .meta { font: 500 12px "SF Pro Display", "PingFang SC", sans-serif; fill: #64748B; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#desk)"/>
  <rect x="0" y="0" width="1600" height="42" fill="#0F172A" fill-opacity="0.42"/>
  <circle cx="1510" cy="21" r="13" fill="#2563EB" fill-opacity="0.88"/>

  <text x="72" y="104" class="title">菜单栏：原生透明风格（细化版）</text>
  <text x="72" y="132" class="hint">字号层级采用系统默认逻辑：Header 13 / Item 16 / Meta 12。</text>

  <rect x="1248" y="52" width="300" height="548" rx="14" fill="#FFFFFF" fill-opacity="0.72" filter="url(#menuShadow)"/>
  <rect x="1248.5" y="52.5" width="299" height="547" rx="13.5" stroke="#FFFFFF" stroke-opacity="0.65"/>

  <text x="1270" y="84" class="menuHeader">OpenStaff</text>
  <line x1="1262" y1="98" x2="1534" y2="98" stroke="#CBD5E1"/>

  <rect x="1262" y="110" width="272" height="34" rx="8" fill="#E2E8F0" fill-opacity="0.6"/>
  <text x="1278" y="132" class="menuItem">打开控制台</text>
  <text x="1498" y="132" class="meta">⌘O</text>

  <text x="1278" y="170" class="menuItem">显示前台部件</text>
  <text x="1486" y="170" class="meta">已显示</text>

  <line x1="1262" y1="184" x2="1534" y2="184" stroke="#CBD5E1"/>
  <text x="1270" y="206" class="menuHeader">部件模式</text>

  <text x="1278" y="236" class="menuItem">✓ 精简模式</text>
  <text x="1278" y="264" class="menuItem">详细模式</text>

  <line x1="1262" y1="278" x2="1534" y2="278" stroke="#CBD5E1"/>
  <text x="1278" y="308" class="menuItem">刷新任务视图</text>

  <line x1="1262" y1="322" x2="1534" y2="322" stroke="#CBD5E1"/>
  <text x="1278" y="352" class="menuDanger">触发紧急停止</text>

  <line x1="1262" y1="366" x2="1534" y2="366" stroke="#CBD5E1"/>
  <text x="1278" y="396" class="menuItem">退出程序</text>
  <text x="1498" y="396" class="meta">⌘Q</text>

  <rect x="72" y="176" width="1080" height="660" rx="24" fill="#0F172A" fill-opacity="0.1"/>
  <text x="106" y="224" fill="#F8FAFC" font-family="SF Pro Display, PingFang SC, sans-serif" font-size="18" font-weight="600">细化要点</text>
  <text x="106" y="258" class="hint">1) Header 只用于分组标题，避免与条目视觉冲突。</text>
  <text x="106" y="286" class="hint">2) 危险项用字重和色彩，不加重底色，保持系统风格克制。</text>
  <text x="106" y="314" class="hint">3) 右侧快捷键与状态信息统一 12px，降低视觉噪声。</text>
</svg>
