<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="desk" x1="120" y1="40" x2="1460" y2="860" gradientUnits="userSpaceOnUse">
      <stop stop-color="#9DB8DA"/>
      <stop offset="0.5" stop-color="#84AFA8"/>
      <stop offset="1" stop-color="#B89A82"/>
    </linearGradient>
    <linearGradient id="orb" x1="1050" y1="580" x2="1330" y2="790" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3B82F6" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#14B8A6" stop-opacity="0.85"/>
    </linearGradient>
    <filter id="orbShadow" x="900" y="500" width="520" height="360" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0F172A" flood-opacity="0.25"/>
    </filter>
    <style>
      .title { font: 700 30px "SF Pro Display", "PingFang SC", sans-serif; fill: #F8FAFC; }
      .hint { font: 500 14px "SF Pro Display", "PingFang SC", sans-serif; fill: #E2E8F0; }
      .text { font: 500 14px "SF Pro Display", "PingFang SC", sans-serif; fill: #EAF4FF; }
      .strong { font: 600 15px "SF Pro Display", "PingFang SC", sans-serif; fill: #FFFFFF; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#desk)"/>

  <text x="76" y="106" class="title">前台部件：精简模式（无重背景）</text>
  <text x="76" y="136" class="hint">使用桌面嵌入视觉，仅保留半透明球/椭圆信息体。</text>

  <g filter="url(#orbShadow)">
    <rect x="982" y="592" width="382" height="158" rx="79" fill="url(#orb)"/>
    <rect x="982.8" y="592.8" width="380.4" height="156.4" rx="78.2" stroke="#DBEAFE" stroke-opacity="0.8" stroke-width="1.6"/>
  </g>

  <circle cx="1052" cy="671" r="40" fill="#0B3F72" fill-opacity="0.45"/>
  <text x="1036" y="677" fill="#E0F2FE" font-family="SF Pro Display, PingFang SC, sans-serif" font-size="15" font-weight="700">OS</text>

  <text x="1110" y="638" class="text">当前任务</text>
  <text x="1110" y="662" class="strong">辅助 · task-024</text>
  <text x="1110" y="688" class="text">下一步：学生 · task-025</text>
  <text x="1110" y="714" class="text">点击球体展开时间轴</text>

  <path d="M1340 674l16 0m-8 -8l8 8l-8 8" stroke="#E0F2FE" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="76" y="190" width="780" height="204" rx="18" fill="#111827" fill-opacity="0.12"/>
  <text x="104" y="232" fill="#F8FAFC" font-family="SF Pro Display, PingFang SC, sans-serif" font-size="18" font-weight="600">精简模式信息密度</text>
  <text x="104" y="266" class="hint">1) 仅显示当前任务和下一步任务（缩略）</text>
  <text x="104" y="294" class="hint">2) 组件本身无实体底板，保留桌面透出</text>
  <text x="104" y="322" class="hint">3) 保持可点击性，点球体直接进入详细时间轴</text>
</svg>
