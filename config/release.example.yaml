app:
  name: OpenStaff
  mode: teaching
  timezone: Asia/Shanghai

storage:
  root: data
  rawEventsDir: raw-events
  taskChunksDir: task-chunks
  knowledgeDir: knowledge
  logsDir: logs
  reportsDir: reports
  feedbackDir: feedback

logging:
  level: info
  format: json

safety:
  emergencyStopEnabled: true
  rulesPath: config/safety-rules.yaml
  blockedActionKeywords:
    - "rm -rf"
    - "删除"
    - "支付"
    - "重置系统"

llm:
  provider: openai
  model: gpt-4.1-mini
  timeoutSeconds: 30
  maxRetries: 3
  requestsPerMinute: 30

openclaw:
  integrationMode: file-first
  executionMode: semantic-only
  rollbackPolicy: release-version-only
  skillsPendingDir: data/skills/pending
  skillsDoneDir: data/skills/done
  cliPath: ${OPENCLAW_CLI_PATH}
