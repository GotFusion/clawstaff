app:
  name: OpenStaff
  mode: teaching
  timezone: Asia/Shanghai

storage:
  root: data
  rawEventsDir: raw-events
  taskChunksDir: task-chunks
  knowledgeDir: knowledge
  logsDir: logs
  reportsDir: reports
  feedbackDir: feedback

logging:
  level: debug
  format: json

llm:
  provider: text
  model: text-deterministic-v0
  timeoutSeconds: 10
  maxRetries: 1
  requestsPerMinute: 60

openclaw:
  integrationMode: file-first
  skillsPendingDir: data/skills/pending
  skillsDoneDir: data/skills/done
  cliPath: vendors/openclaw/bin/openclaw
